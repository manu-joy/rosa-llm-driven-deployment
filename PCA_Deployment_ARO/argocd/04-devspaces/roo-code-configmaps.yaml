# DevSpaces AI extension ConfigMaps.
#
# DESIGN:
#   All ConfigMaps are created per-namespace (dev1/dev2/dev3-devspaces) because the
#   DevSpaces operator does NOT reliably propagate ConfigMaps from the central
#   openshift-devspaces namespace to workspace namespaces when the workspace starts
#   before the ConfigMap is created (ArgoCD timing).
#
#   continue-config  — mounted read-only at /home/user/.continue (subpath: config.yaml).
#                      The DevWorkspace postStart script creates a writable
#                      /home/user/.continue-data/ directory and symlinks config.yaml into it so
#                      Continue can write session data alongside a read-only config.
#
#   roo-code-provider-config — mounted via subpath directly into Roo Code's
#                      active settings path. Uses the `openai` provider (NOT `openai-native`)
#                      with streaming disabled so the qwen3_coder tool-call parser returns
#                      complete structured tool_calls instead of fragmented streaming XML.
#
# NOTE: The llm-d gateway URL uses HTTPS with a cluster-internal cert; extensions must set
#       NODE_TLS_REJECT_UNAUTHORIZED=0 or requestOptions.verifySsl=false.
---
# ── Continue config — dev1-devspaces ───────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: continue-config
  namespace: dev1-devspaces
  labels:
    controller.devfile.io/mount-to-devworkspace: "true"
    controller.devfile.io/watch-configmap: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    controller.devfile.io/mount-as: subpath
    controller.devfile.io/mount-path: /home/user/.continue
data:
  config.yaml: |
    name: Private Code Assistant
    version: 1.0.0
    schema: v1
    models:
      - name: Qwen3.6-35B-A3B (llm-d)
        provider: openai
        model: Qwen/Qwen3.6-35B-A3B-FP8
        apiBase: https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1
        apiKey: EMPTY
        systemMessage: "You are a helpful coding assistant. Respond using natural language and code blocks only. Never use XML tool-call syntax such as <tool_call>, <function=...>, or <parameter=...> in your responses."
        requestOptions:
          verifySsl: false
    tabAutocompleteModel:
      name: Qwen3.6-35B-A3B Autocomplete (llm-d)
      provider: openai
      model: Qwen/Qwen3.6-35B-A3B-FP8
      apiBase: https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local/v1
      apiKey: EMPTY
      requestOptions:
        verifySsl: false
---
