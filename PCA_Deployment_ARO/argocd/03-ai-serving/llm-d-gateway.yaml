# Dedicated llm-d Gateway for internal cluster routing through EPP.
# Extensions use this Gateway's ClusterIP (never the external ELB).
#
# The resulting internal DNS endpoint is:
#   https://llm-d-gateway-data-science-gateway-class.ai-serving.svc.cluster.local
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-gateway
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  gatewayClassName: data-science-gateway-class
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: llm-d-gateway-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
---
# HTTPRoute: routes all /v1 inference traffic to the vLLM workload service.
# Uses direct Service backend (not InferencePool) for compatibility with
# the custom vLLM 0.17.1 runtime required by the Qwen3.6 model.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-route
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-d-gateway
      namespace: ai-serving
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - group: ""
          kind: Service
          name: qwen36-35b-kserve-workload-svc
          port: 8000
          weight: 1
      timeouts:
        backendRequest: "0s"
        request: "0s"
---
# DestinationRule: TLS origination for the vLLM backend.
# The vLLM pod serves over HTTPS (using KServe-injected certs), so the
# gateway proxy must initiate TLS when forwarding traffic upstream.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: qwen36-35b-tls-origination
  namespace: ai-serving
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  host: qwen36-35b-kserve-workload-svc.ai-serving.svc.cluster.local
  trafficPolicy:
    portLevelSettings:
      - port:
          number: 8000
        tls:
          mode: SIMPLE
          insecureSkipVerify: true
