  <rect x="1354" y="484" width="148" height="14" rx="2" fill="#E8F5E9"/>
  <text x="1428" y="494" text-anchor="middle" fill="#2E7D32" font-size="6">Neuron SDK 2.28 &#183; vLLM 0.13</text>

  <!-- Network flow annotation -->
  <rect x="560" y="720" width="440" height="140" rx="8" fill="#263238" opacity="0.95"/>
  <text x="780" y="744" text-anchor="middle" fill="#4DD0E1" font-size="10" font-weight="700">Private Connectivity Flow</text>
  <text x="580" y="768" fill="#B0BEC5" font-size="8.5">1. Developer traffic originates on customer premises</text>
  <text x="580" y="786" fill="#B0BEC5" font-size="8.5">2. Routed over AWS Direct Connect (dedicated circuit)</text>
  <text x="580" y="804" fill="#B0BEC5" font-size="8.5">3. Transit Gateway routes to ROSA VPC via attachment</text>
  <text x="580" y="822" fill="#B0BEC5" font-size="8.5">4. Internal NLB forwards to ROSA worker nodes</text>
  <text x="580" y="840" fill="#B0BEC5" font-size="8.5">5. K8s API accessible via PrivateLink endpoint</text>

  <!-- Key differentiators -->
  <rect x="1020" y="720" width="310" height="140" rx="8" fill="#263238" opacity="0.95"/>
  <text x="1175" y="744" text-anchor="middle" fill="#FF9900" font-size="10" font-weight="700">Enterprise Network Design</text>
  <text x="1040" y="768" fill="#B0BEC5" font-size="8.5">&#8226; No Internet Gateway &#8212; zero public exposure</text>
  <text x="1040" y="786" fill="#B0BEC5" font-size="8.5">&#8226; Direct Connect: dedicated, low-latency circuit</text>
  <text x="1040" y="804" fill="#B0BEC5" font-size="8.5">&#8226; Transit Gateway: centralized routing hub</text>
  <text x="1040" y="822" fill="#B0BEC5" font-size="8.5">&#8226; PrivateLink: K8s API on private network</text>
  <text x="1040" y="840" fill="#B0BEC5" font-size="8.5">&#8226; Source code never traverses public internet</text>

  <!-- Legend -->
  <rect x="540" y="876" width="1024" height="22" rx="4" fill="#232F3E"/>
  <text x="560" y="892" fill="#FF9900" font-size="8.5" font-weight="600">AWS Architectural View &#8212; Private Code Assistant</text>
  <rect x="800" y="881" width="10" height="10" rx="2" fill="#76B900"/>
  <text x="814" y="891" fill="#B0BEC5" font-size="7.5">NVIDIA L40S</text>
  <rect x="880" y="881" width="10" height="10" rx="2" fill="#FF8F00"/>
  <text x="894" y="891" fill="#B0BEC5" font-size="7.5">Inferentia2</text>
  <rect x="960" y="881" width="10" height="10" rx="2" fill="#BF360C"/>
  <text x="974" y="891" fill="#B0BEC5" font-size="7.5">Trainium</text>
