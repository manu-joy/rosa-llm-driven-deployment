  <text x="1054" y="891" fill="#B0BEC5" font-size="7.5">General</text>
  <text x="1540" y="892" text-anchor="end" fill="#78909C" font-size="7.5">ROSA HCP 4.21 &#183; Multi-AZ &#183; Private connectivity</text>
