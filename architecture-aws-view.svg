  <text x="1428" y="398" text-anchor="middle" fill="#D84315" font-size="6.5">Qwen3-Coder-30B &#183; TP=8-16</text>
  <rect x="1354" y="408" width="148" height="24" rx="2" fill="#455A64"/>
  <text x="1428" y="420" text-anchor="middle" fill="#fff" font-size="7" font-weight="600">4&#215; NVMe (7.6 TB)</text>
  <text x="1428" y="430" text-anchor="middle" fill="#CFD8DC" font-size="6">NEFF compilation scratch</text>
  <rect x="1354" y="438" width="148" height="20" rx="2" fill="#EDE7F6" stroke="#7C4DFF" stroke-width="0.5"/>
