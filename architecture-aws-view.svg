  <text x="1134" y="456" fill="#546E7A" font-size="7">&#8226; workers-0 (us-east-2a)</text>
  <text x="1134" y="470" fill="#546E7A" font-size="7">&#8226; workers-1 (us-east-2b)</text>
  <text x="1134" y="486" fill="#78909C" font-size="6.5">Scaled 0-N per pool via ROSA CLI</text>

